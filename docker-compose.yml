# Runs the released Marty artifact. MARTY_IMAGE must include an immutable sha256 digest.
services:
  marty:
    image: ${MARTY_IMAGE:?set MARTY_IMAGE to ghcr.io/elevenid/marty@sha256:<digest>}
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    ports:
      - "28080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
