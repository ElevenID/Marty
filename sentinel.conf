# Redis Sentinel Configuration File
# ==================================
#
# This file can be used as a standalone sentinel.conf for external Redis Sentinel deployments.
# For docker-compose usage, see docker-compose.sentinel.yml which embeds this config inline.

# Monitor the master named "mymaster" at redis-master:6379
# Quorum: 2 Sentinels must agree before initiating failover
sentinel monitor mymaster redis-master 6379 2

# Consider master as down after 5 seconds of no response
sentinel down-after-milliseconds mymaster 5000

# During failover, only sync 1 replica at a time to minimize performance impact
sentinel parallel-syncs mymaster 1

# Failover timeout: 10 seconds (revert if failover doesn't complete)
sentinel failover-timeout mymaster 10000

# Security: Deny runtime reconfiguration of scripts
sentinel deny-scripts-reconfig yes

# Optional: Authentication (uncomment if Redis has requirepass set)
# sentinel auth-pass mymaster your-redis-password

# Optional: Notification scripts (executed on events)
# sentinel notification-script mymaster /path/to/notification-script.sh
# sentinel client-reconfig-script mymaster /path/to/reconfig-script.sh
