# Configuration for cargo-deny
# See https://embarkstudios.github.io/cargo-deny/

[graph]
# Exclude dev dependencies from license and advisory checks for faster CI
exclude-dev = true

[advisories]
# Security vulnerability database
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Treat warnings as errors in CI
yanked = "deny"
# Ignore specific advisories if needed (with justification)
ignore = [
    # owning_ref soundness issue - comes from ssi crate's transitive deps
    # Tracked upstream, waiting for ssi to update json-ld dependencies
    "RUSTSEC-2022-0040",
    # serde_cbor is unmaintained - comes from ssi-data-integrity-suites
    # Tracked upstream, waiting for ssi to migrate to ciborium
    "RUSTSEC-2021-0127",
    # derivative is unmaintained - comes from ssi transitive deps
    # Common issue, crate is stable and widely used
    "RUSTSEC-2024-0388",
    # proc-macro-error is unmaintained - comes from ssi transitive deps
    "RUSTSEC-2024-0370",
    # rustls-pemfile is unmaintained - comes from ssi transitive deps
    # Should be replaced with rustls-pem, tracked upstream
    "RUSTSEC-2025-0134",
    # RSA Marvin Attack vulnerability - comes from ssi transitive deps
    # We don't use RSA decryption directly, only signature verification
    "RUSTSEC-2023-0071",
]

[licenses]
# List of allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]
# Confidence threshold for license detection
confidence-threshold = 0.8

# Handle crates without license info in Cargo.toml
[[licenses.clarify]]
name = "sshkeys"
expression = "MIT"
license-files = []

# Clarify licenses for specific crates if needed
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Lint level for multiple versions of the same crate
multiple-versions = "warn"
# Lint level for direct crates with wildcards
wildcards = "deny"
# Highlight the conflicting crates
highlight = "all"
# Allow specific duplicate crates if necessary
allow = []
# Deny specific crates (known insecure or unwanted)
deny = [
    # Outdated/unmaintained crates
    { crate = "rustc-serialize" },
    { crate = "gcc" },
]
# Skip checking certain crates for multiple versions
skip = []
# Skip checking entire dependency trees
skip-tree = []

[sources]
# Lint level for unknown registries
unknown-registry = "deny"
# Lint level for unknown git repositories
unknown-git = "deny"
# Allowed registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Allow specific git repositories if needed
allow-git = []
