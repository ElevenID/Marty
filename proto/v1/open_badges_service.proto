syntax = "proto3";

package marty.open_badges.v1;

import "common_services.proto";
import "google/protobuf/empty.proto";

// Supported Open Badges versions
enum OpenBadgeVersion {
  OPEN_BADGE_VERSION_UNSPECIFIED = 0;
  OPEN_BADGE_V2 = 1;
  OPEN_BADGE_V3 = 2;
}

// Request to issue an Open Badge credential
message IssueOpenBadgeRequest {
  OpenBadgeVersion version = 1;
  string request_json = 2;
}

// Response for Open Badge issuance
message IssueOpenBadgeResponse {
  bool issued = 1;
  string version = 2;
  string credential_json = 3;
  repeated string warnings = 4;
  marty.common.v1.ApiError error = 5;
}

// Request to verify an Open Badge credential
message VerifyOpenBadgeRequest {
  OpenBadgeVersion version = 1;
  string request_json = 2;
}

// Response for Open Badge verification
message VerifyOpenBadgeResponse {
  bool valid = 1;
  string version = 2;
  repeated string errors = 3;
  repeated string error_codes = 4;
  repeated string warnings = 5;
  string normalized_json = 6;
  marty.common.v1.ApiError error = 7;
}

// Trust document entry for the Open Badges document store
message TrustDocument {
  string id = 1;
  string document_json = 2;
}

// Response for trust store fetch
message GetTrustStoreResponse {
  repeated TrustDocument documents = 1;
  marty.common.v1.ApiError error = 2;
}

// Request to update trust store
message UpsertTrustStoreRequest {
  repeated TrustDocument documents = 1;
  bool replace = 2;
}

// Response for trust store update
message UpsertTrustStoreResponse {
  int32 stored = 1;
  string status = 2;
  marty.common.v1.ApiError error = 3;
}

// Open Badges service
service OpenBadgesService {
  rpc IssueOpenBadge(IssueOpenBadgeRequest) returns (IssueOpenBadgeResponse);
  rpc VerifyOpenBadge(VerifyOpenBadgeRequest) returns (VerifyOpenBadgeResponse);
  rpc GetTrustStore(google.protobuf.Empty) returns (GetTrustStoreResponse);
  rpc UpsertTrustStore(UpsertTrustStoreRequest) returns (UpsertTrustStoreResponse);
}
