name: Protocol validation

on:
  pull_request:
    paths: ["proto/**", "src/compile_protos.py", ".github/workflows/proto-validation.yml"]
  push:
    branches: [main]
    paths: ["proto/**", "src/compile_protos.py", ".github/workflows/proto-validation.yml"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - run: python -m pip install grpcio-tools
      - name: Compile all public protocol definitions
        shell: bash
        run: |
          mkdir -p /tmp/marty-proto
          python -m grpc_tools.protoc \
            --proto_path=proto \
            --python_out=/tmp/marty-proto \
            --grpc_python_out=/tmp/marty-proto \
            proto/*.proto
          test -n "$(find /tmp/marty-proto -type f -name '*_pb2.py' -print -quit)"
