name: Publish marty-common Beta

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'packages/marty-common/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Beta version to publish (e.g., 0.1.0-beta.1)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish-beta:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set beta version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            BASE_VERSION=$(grep -oP '__version__ = "\K[^"]+' packages/marty-common/marty_common/__init__.py || echo "0.1.0")
            VERSION="${BASE_VERSION}-beta.$(date +%Y%m%d).${SHORT_SHA}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing beta version: $VERSION"
      
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling twine
      
      - name: Update version
        working-directory: packages/marty-common
        run: |
          sed -i "s/__version__ = .*/__version__ = \"${{ steps.version.outputs.VERSION }}\"/" marty_common/__init__.py
      
      - name: Build package
        working-directory: packages/marty-common
        run: python -m build
      
      - name: Publish to GitHub Packages
        working-directory: packages/marty-common
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_URL="https://upload.pypi.org/legacy/"
          
          twine upload dist/* \
            --repository-url "$REPO_URL" \
            --skip-existing \
            --non-interactive || echo "Warning: Upload failed"
      
      - name: Create artifact manifest
        working-directory: packages/marty-common
        run: |
          echo "# Beta Release - marty-common" > dist/MANIFEST.md
          echo "" >> dist/MANIFEST.md
          echo "Version: ${{ steps.version.outputs.VERSION }}" >> dist/MANIFEST.md
          echo "Commit: ${{ github.sha }}" >> dist/MANIFEST.md
          echo "Date: $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)" >> dist/MANIFEST.md
          echo "" >> dist/MANIFEST.md
          echo "## Installation" >> dist/MANIFEST.md
          echo '```bash' >> dist/MANIFEST.md
          echo "pip install marty-common==${{ steps.version.outputs.VERSION }}" >> dist/MANIFEST.md
          echo '```' >> dist/MANIFEST.md
          echo "" >> dist/MANIFEST.md
          echo "## Artifacts" >> dist/MANIFEST.md
          ls -lh dist/*.whl dist/*.tar.gz >> dist/MANIFEST.md 2>/dev/null || true
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beta-release-${{ steps.version.outputs.VERSION }}
          path: |
            packages/marty-common/dist/*.whl
            packages/marty-common/dist/*.tar.gz
            packages/marty-common/dist/MANIFEST.md
          retention-days: 30
