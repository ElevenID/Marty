name: Release Marty

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE: ghcr.io/elevenid/marty

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Validate release version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          actual="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          test "$actual" = "$version"
          echo "value=$version" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and publish Marty image
        id: image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: docker/mmf-plugin.Dockerfile
          target: production
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.value }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
            VCS_REF=${{ github.sha }}
          provenance: mode=max
          sbom: true
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
      - name: Sign image and verify the runtime
        shell: bash
        run: |
          cosign sign --yes "${IMAGE}@${{ steps.image.outputs.digest }}"
          docker pull "${IMAGE}@${{ steps.image.outputs.digest }}"
          docker run --rm -d --name marty-release -p 18080:8080 "${IMAGE}@${{ steps.image.outputs.digest }}"
          for attempt in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:18080/health > health.json && break
            if [ "$attempt" = 30 ]; then docker logs marty-release; exit 1; fi
            sleep 2
          done
          docker stop marty-release
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.IMAGE }}@${{ steps.image.outputs.digest }}
          format: cyclonedx-json
          output-file: marty-sbom.cdx.json
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310
        with:
          version: v3.17.3
      - name: Package and publish the digest-pinned Helm chart
        env:
          VERSION: ${{ steps.version.outputs.value }}
          DIGEST: ${{ steps.image.outputs.digest }}
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          helm lint deploy/helm/marty --set "image.digest=$DIGEST"
          helm template marty deploy/helm/marty --set "image.digest=$DIGEST" > rendered-chart.yaml
          helm package deploy/helm/marty --version "$VERSION" --app-version "$VERSION"
          echo "$GITHUB_TOKEN" | helm registry login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          helm push "marty-${VERSION}.tgz" oci://ghcr.io/elevenid/charts
      - name: Sign release evidence
        shell: bash
        run: |
          printf '%s  %s\n' "${{ steps.image.outputs.digest }}" "${IMAGE}" > IMAGE_DIGEST
          for file in ./marty-*.tgz marty-sbom.cdx.json rendered-chart.yaml IMAGE_DIGEST health.json; do
            cosign sign-blob --yes --bundle "${file}.sigstore.json" "$file"
          done
          sha256sum ./marty-*.tgz marty-sbom.cdx.json rendered-chart.yaml IMAGE_DIGEST health.json ./*.sigstore.json > SHA256SUMS
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: |
            marty-*.tgz
            marty-sbom.cdx.json
            rendered-chart.yaml
            IMAGE_DIGEST
            health.json
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          generate_release_notes: true
          files: |
            marty-*.tgz
            marty-sbom.cdx.json
            rendered-chart.yaml
            IMAGE_DIGEST
            health.json
            *.sigstore.json
            SHA256SUMS
