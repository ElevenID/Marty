name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 2"

permissions:
  contents: read

jobs:
  analyze:
    uses: ElevenID/.github/.github/workflows/codeql.yml@9b6141e294da5c0f9254cfaa60c8934df95ec68b
    with:
      languages: '["python"]'
    permissions:
      contents: read
      security-events: write
      packages: read
