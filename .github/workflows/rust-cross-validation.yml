name: Rust Cross-Validation

# Run comprehensive cross-validation tests against OpenSSL on tagged releases
# This provides high-confidence verification that our pure-Rust implementation
# produces the same results as battle-tested cryptographic libraries.

on:
  push:
    tags:
      - 'v*'
      - 'rust-v*'
    paths:
      - 'rust/**'
  pull_request:
    paths:
      - 'rust/**'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable verbose output'
        required: false
        default: 'false'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Quick tests run on every PR
  quick-tests:
    name: Quick Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      OPEN_BADGES_OB2_VERIFY_REQUEST: ${{ github.workspace }}/rust/marty-verification/tests/fixtures/open_badges/ob2_verify_request.json
      OPEN_BADGES_OB3_VERIFY_REQUEST: ${{ github.workspace }}/rust/marty-verification/tests/fixtures/open_badges/ob3_verify_request.json
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-quick-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests
        working-directory: rust/marty-verification
        run: cargo test --verbose

      - name: Run tests with ocsp-client feature
        working-directory: rust/marty-verification
        run: cargo test --features ocsp-client --verbose

      - name: Run chain validation integration tests
        working-directory: rust/marty-verification
        run: cargo test --test chain_validation_tests --verbose

      - name: Check Python bindings compilation
        working-directory: rust/marty-verification
        run: cargo check --features python,ocsp-client

  cross-validation:
    name: Cross-Validation Tests
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      OPEN_BADGES_OB2_VERIFY_REQUEST: ${{ github.workspace }}/rust/marty-verification/tests/fixtures/open_badges/ob2_verify_request.json
      OPEN_BADGES_OB3_VERIFY_REQUEST: ${{ github.workspace }}/rust/marty-verification/tests/fixtures/open_badges/ob3_verify_request.json
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable, beta]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt
          target: ${{ matrix.target }}

      - name: Install OpenSSL (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install OpenSSL (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-

      - name: Build with cross-validation feature
        working-directory: rust/marty-verification
        run: cargo build --features cross-validation --verbose

      - name: Run standard tests
        working-directory: rust/marty-verification
        run: cargo test --verbose

      - name: Run cross-validation tests
        working-directory: rust/marty-verification
        run: cargo test --features cross-validation --verbose -- --nocapture

      - name: Run clippy with cross-validation
        working-directory: rust/marty-verification
        run: cargo clippy --features cross-validation -- -D warnings
        continue-on-error: true

  # Property-based testing with extended iterations
  property-tests:
    name: Extended Property Tests
    runs-on: ubuntu-latest
    env:
      OPEN_BADGES_OB2_VERIFY_REQUEST: ${{ github.workspace }}/rust/marty-verification/tests/fixtures/open_badges/ob2_verify_request.json
      OPEN_BADGES_OB3_VERIFY_REQUEST: ${{ github.workspace }}/rust/marty-verification/tests/fixtures/open_badges/ob3_verify_request.json
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Install OpenSSL
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-proptest-${{ hashFiles('**/Cargo.lock') }}

      - name: Run extended property tests
        working-directory: rust/marty-verification
        env:
          PROPTEST_CASES: 10000
        run: |
          cargo test --features cross-validation property_tests -- --nocapture

  # Summary report
  summary:
    name: Cross-Validation Summary
    needs: [cross-validation, property-tests]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check results
        run: |
          echo "## Cross-Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.cross-validation.result }}" == "success" ]; then
            echo "✅ Cross-validation tests passed on all platforms" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Cross-validation tests failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.property-tests.result }}" == "success" ]; then
            echo "✅ Extended property tests passed (10,000 cases)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Property tests failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- NIST PKITS certificates: 100+ test cases" >> $GITHUB_STEP_SUMMARY
          echo "- OpenSSL cross-validation: signature, parsing, chain validation" >> $GITHUB_STEP_SUMMARY
          echo "- Synthetic certificate generation: expired, malformed, edge cases" >> $GITHUB_STEP_SUMMARY
          echo "- Property-based fuzzing: random DER parsing, corruption resilience" >> $GITHUB_STEP_SUMMARY
