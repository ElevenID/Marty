name: Publish marty-common to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-python-package:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling
          
      - name: Update version (if manual trigger)
        if: github.event_name == 'workflow_dispatch'
        working-directory: packages/marty-common
        run: |
          sed -i "s/__version__ = .*/__version__ = \"${{ github.event.inputs.version }}\"/" marty_common/__init__.py
          
      - name: Build package
        working-directory: packages/marty-common
        run: python -m build
        
      - name: Publish to GitHub Packages
        working-directory: packages/marty-common
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          TWINE_REPOSITORY_URL: https://upload.pypi.org/legacy/  # Or GitHub Packages URL
        run: |
          pip install twine
          twine upload dist/* \
            --repository-url https://upload-pypi.pkg.github.com/${{ github.repository_owner }}/ \
            --username __token__ \
            --password ${{ secrets.GITHUB_TOKEN }}
            
      - name: Create release artifacts
        if: github.event_name == 'release'
        working-directory: packages/marty-common
        run: |
          cp dist/*.whl dist/*.tar.gz $GITHUB_WORKSPACE/ || true
          
      - name: Upload to release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./marty_common-*.whl
          asset_name: marty_common-${{ github.event.release.tag_name }}-py3-none-any.whl
          asset_content_type: application/zip
