name: Publish Product Catalog

on:
  # Disabled by default during development; run manually when ready.
  workflow_dispatch:

env:
  CATALOG_REPO: ${{ vars.CATALOG_REPO || 'burdettadam/product-catalog' }}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout product-catalog
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CATALOG_REPO }}
          token: ${{ secrets.PRODUCT_CATALOG_TOKEN }}
          path: product-catalog

      - name: Sync product data into catalog
        run: python scripts/sync_product_catalog.py

      - name: Open PR to catalog
        uses: peter-evans/create-pull-request@v6
        with:
          path: product-catalog
          token: ${{ secrets.PRODUCT_CATALOG_TOKEN }}
          branch: sync/catalog-${{ github.run_id }}
          commit-message: "chore: sync product catalog from ${GITHUB_REPOSITORY}"
          title: "chore: sync product catalog from ${GITHUB_REPOSITORY}"
          body: |
            Automated sync from ${GITHUB_REPOSITORY}.

            - verification-api: pyproject + docs/CHANGELOG.md
            - kiosk: marty-verifier/Cargo.toml
            - issuance-api: placeholder until dedicated versioning is wired
