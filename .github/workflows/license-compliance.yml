# SPDX-License-Identifier: AGPL-3.0-only
name: License Compliance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'LICENSE'
      - 'README.md'
  pull_request:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'LICENSE'
      - 'README.md'

jobs:
  metadata-consistency:
    name: License Metadata Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Check license metadata consistency
        run: |
          python - <<'EOF'
          import sys
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          fail = False

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          proj = data.get("project", {})
          license_val = proj.get("license", {})

          # Support both {text = "..."} and {file = "..."} forms
          if isinstance(license_val, dict):
              license_text = license_val.get("text", license_val.get("file", ""))
          else:
              license_text = str(license_val)

          if "AGPL-3.0" not in license_text:
              print(f"FAIL: pyproject.toml license = {license_text!r}, expected AGPL-3.0-only")
              fail = True
          else:
              print(f"OK: pyproject.toml license = {license_text!r}")

          import os
          if not os.path.exists("LICENSE"):
              print("FAIL: LICENSE file is missing")
              fail = True
          else:
              print("OK: LICENSE present")

          with open("README.md") as f:
              readme = f.read()
          if "## License" not in readme:
              print("FAIL: README.md is missing a ## License section")
              fail = True
          else:
              print("OK: README.md has ## License section")

          sys.exit(1 if fail else 0)
          EOF

  dependency-license-inventory:
    name: Dependency License Inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install smart-card build dependencies
        run: sudo apt-get update && sudo apt-get install --yes libpcsclite-dev

      - name: Install project dependencies
        run: uv sync --all-extras

      - name: Generate dependency license inventory
        run: |
          uv pip install pip-licenses
          uv run pip-licenses --format=json > dependency-licenses.json

      - name: Upload license inventory
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dependency-licenses
          path: dependency-licenses.json

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install smart-card build dependencies
        run: sudo apt-get update && sudo apt-get install --yes libpcsclite-dev

      - name: Install project dependencies
        run: uv sync --all-extras

      - name: Install cyclonedx-bom
        run: uv pip install cyclonedx-bom

      - name: Generate CycloneDX SBOM
        run: uv run cyclonedx-py environment "$(uv python find)" --of json --output-file sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom
          path: sbom.cdx.json
