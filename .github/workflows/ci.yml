name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
          cache: pip
      - name: Install smart-card build dependencies
        run: sudo apt-get update && sudo apt-get install --yes libpcsclite-dev
      - name: Install from released dependencies
        run: python -m pip install packages/marty-common .
      - name: Compile and test
        run: |
          python -m compileall -q src
          python -m pytest tests/unit -q
      - name: Verify package metadata
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: docker/mmf-plugin.Dockerfile
          target: production
          push: false
          tags: marty:ci
          build-args: |
            VERSION=ci
            VCS_REF=${{ github.sha }}
          provenance: false
