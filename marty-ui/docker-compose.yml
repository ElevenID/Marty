version: '3.8'

services:
  # =============================================================================
  # Core Application Services
  # =============================================================================
  oid4vc-api:
    build:
      context: ..
      dockerfile: marty-ui/docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ADAPTER_MODE=${ADAPTER_MODE:-spruceid}
      - STORAGE_MODE=${STORAGE_MODE:-memory}
      # Authentication Configuration
      - OIDC_ISSUER_URL=http://localhost:8180/realms/marty
      - OIDC_BACKEND_ISSUER_URL=http://keycloak:8080/realms/marty
      - OIDC_CLIENT_ID=marty-ui
      - OIDC_REDIRECT_URI=http://localhost:9080/auth/callback
      - OIDC_POST_LOGOUT_REDIRECT_URI=http://localhost:9080
      # Redis Configuration
      - REDIS_URL=redis://redis:6379/0
      - SESSION_SECRET=${SESSION_SECRET:-dev-session-secret-change-in-production}
      # Cookie Configuration (development defaults)
      - COOKIE_SECURE=false
      - COOKIE_SAMESITE=lax
      # Note: COOKIE_DOMAIN is intentionally not set for development
      # This allows the cookie to be bound to the exact origin (localhost:9080)
      # Database Configuration
      - APPLICANT_DB_URL=postgresql+asyncpg://marty:marty@applicant-db:5432/marty_applicants
    volumes:
      - ./src:/app/src
      - ../marty-microservices-framework:/app/marty-microservices-framework
    depends_on:
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
      applicant-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
      args:
        # Use dev config for local development (includes 'unsafe-eval' for React)
        # For production, remove this arg or set to nginx.prod.conf
        NGINX_CONFIG: nginx.dev.conf
    ports:
      - "9080:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_KEYCLOAK_URL=http://localhost:8180
      - REACT_APP_KEYCLOAK_REALM=marty
      - REACT_APP_KEYCLOAK_CLIENT_ID=marty-ui
    depends_on:
      oid4vc-api:
        condition: service_healthy

  # =============================================================================
  # Authentication & Session Services
  # =============================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command:
      - start-dev
      - --import-realm
      - --features=organization
    ports:
      - "8180:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:-keycloak}
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
      # SMTP Configuration (MailHog for development)
      - KC_SPI_EMAIL_SENDER=default
      - KC_SPI_EMAIL_SENDER_DEFAULT_HOST=mailhog
      - KC_SPI_EMAIL_SENDER_DEFAULT_PORT=1025
      - KC_SPI_EMAIL_SENDER_DEFAULT_FROM=noreply@marty.demo
      - KC_SPI_EMAIL_SENDER_DEFAULT_FROM_DISPLAY_NAME=Marty Trust Services
      # OIDC Client configuration
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-marty-ui}
      # Demo Admin user
      - DEMO_ADMIN_EMAIL=${DEMO_ADMIN_EMAIL:-admin@marty.demo}
      - DEMO_ADMIN_FIRST_NAME=${DEMO_ADMIN_FIRST_NAME:-Admin}
      - DEMO_ADMIN_LAST_NAME=${DEMO_ADMIN_LAST_NAME:-User}
      - DEMO_ADMIN_PASSWORD=${DEMO_ADMIN_PASSWORD:-Admin123!}
      # Demo Vendor user
      - DEMO_VENDOR_EMAIL=${DEMO_VENDOR_EMAIL:-vendor@marty.demo}
      - DEMO_VENDOR_FIRST_NAME=${DEMO_VENDOR_FIRST_NAME:-Vendor}
      - DEMO_VENDOR_LAST_NAME=${DEMO_VENDOR_LAST_NAME:-Admin}
      - DEMO_VENDOR_PASSWORD=${DEMO_VENDOR_PASSWORD:-Vendor123!}
      # Demo Applicant shared password
      - DEMO_APPLICANT_PASSWORD=${DEMO_APPLICANT_PASSWORD:-Applicant123!}
      # Demo Applicant 1
      - DEMO_APPLICANT1_EMAIL=${DEMO_APPLICANT1_EMAIL:-john.doe@marty.demo}
      - DEMO_APPLICANT1_FIRST_NAME=${DEMO_APPLICANT1_FIRST_NAME:-John}
      - DEMO_APPLICANT1_LAST_NAME=${DEMO_APPLICANT1_LAST_NAME:-Doe}
      - DEMO_APPLICANT1_NATIONALITY=${DEMO_APPLICANT1_NATIONALITY:-USA}
      - DEMO_APPLICANT1_DOB=${DEMO_APPLICANT1_DOB:-1985-03-15}
      # Demo Applicant 2
      - DEMO_APPLICANT2_EMAIL=${DEMO_APPLICANT2_EMAIL:-jane.smith@marty.demo}
      - DEMO_APPLICANT2_FIRST_NAME=${DEMO_APPLICANT2_FIRST_NAME:-Jane}
      - DEMO_APPLICANT2_LAST_NAME=${DEMO_APPLICANT2_LAST_NAME:-Smith}
      - DEMO_APPLICANT2_NATIONALITY=${DEMO_APPLICANT2_NATIONALITY:-GBR}
      - DEMO_APPLICANT2_DOB=${DEMO_APPLICANT2_DOB:-1990-07-22}
      # Demo Applicant 3
      - DEMO_APPLICANT3_EMAIL=${DEMO_APPLICANT3_EMAIL:-carlos.garcia@marty.demo}
      - DEMO_APPLICANT3_FIRST_NAME=${DEMO_APPLICANT3_FIRST_NAME:-Carlos}
      - DEMO_APPLICANT3_LAST_NAME=${DEMO_APPLICANT3_LAST_NAME:-Garcia}
      - DEMO_APPLICANT3_NATIONALITY=${DEMO_APPLICANT3_NATIONALITY:-ESP}
      - DEMO_APPLICANT3_DOB=${DEMO_APPLICANT3_DOB:-1978-11-08}
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import:ro
      - ./config/keycloak/themes/marty:/opt/keycloak/themes/marty:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      # Keycloak 25.0+ uses management interface on port 9000 for health checks
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # =============================================================================
  # Email Testing (MailHog - Development Only)
  # =============================================================================
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    environment:
      - MH_STORAGE=memory
      - MH_UI_WEB_PATH=/

  keycloak-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =============================================================================
  # Application Database
  # =============================================================================
  applicant-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=marty_applicants
      - POSTGRES_USER=marty
      - POSTGRES_PASSWORD=${APPLICANT_DB_PASSWORD:-marty}
    volumes:
      - applicant-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marty -d marty_applicants"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Demo Data Seeding (one-shot service)
  # =============================================================================
  seed:
    build:
      context: .
      dockerfile: docker/seed.Dockerfile
    environment:
      - APPLICANT_DB_URL=postgresql+asyncpg://marty:marty@applicant-db:5432/marty_applicants
      - KEYCLOAK_ADMIN_URL=http://keycloak:8080
      - KEYCLOAK_REALM=marty
    depends_on:
      oid4vc-api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: on-failure:3

volumes:
  keycloak-db-data:
  redis-data:
  applicant-db-data:
