[pytest]
# Pytest configuration for Marty

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Minimum version
minversion = 7.0

# Output
addopts = 
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short
    -p no:warnings
    --color=yes

# Async support
asyncio_mode = auto

# Markers for test categorization
markers =
    integration: Integration tests requiring external services (DB, LocalStack, etc.)
    localstack: Tests requiring LocalStack AWS emulation
    softwarehsm: Tests using SoftwareHSMProvider (no external dependencies)
    unit: Unit tests (mocked dependencies)
    security: Security-focused tests
    slow: Slow tests (> 1 second)
    performance: Performance/load tests
    e2e: End-to-end tests using CLI through real gateway paths
    depends: marks tests that depend on other tests
    openid4vp: marks tests as OpenID4VP presentation protocol tests
    passport: marks tests as passport-related tests
    mdl: marks tests as mobile driver license tests
    admin: marks tests as admin interface tests
    mvp: marks tests that cover the defined MVP feature set
    oidc4vc: marks tests as OIDC4VC protocol tests
    sphereon: marks tests as Sphereon compatibility tests
    contract: marks tests as service contract tests
    chaos: marks tests as chaos engineering tests
    mdoc_presentation: marks tests for mDoc presentation flows
    mdl_presentation: marks tests for mDL presentation flows
    cross_sdk: marks tests for cross-SDK compatibility testing
    smoke: marks tests as smoke tests
    ui: marks tests as UI tests
    api_integration: API integration tests for UI-facing endpoints

# Coverage settings
[coverage:run]
source = src
omit = 
    */tests/*
    */conftest.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = test-results/coverage-html
